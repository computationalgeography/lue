[tool.codespell]
skip = "*.cpp,*.cpp.in,*.hpp,*.hpp.in,*.tex,*_test.py,pyproject.toml"
ignore-words-list = "nD"

# https://docs.astral.sh/ruff/configuration/
[tool.ruff.lint]
ignore = ["F403"]

[tool.typos]
default.extend-ignore-identifiers-re = [
    ".*_FPR_.*",
    "InputElemenT",
    "nd",
    "ND",
    "setp",
]
default.extend-ignore-words-re = ["PN"]
