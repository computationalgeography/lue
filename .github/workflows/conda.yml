name: Conda packages

on:
  pull_request:
    # branches-ignore:
    #   - "*"
    paths:
      - "**"
      - "!.github/workflows/*"
      - ".github/workflows/conda.yml"
      - "!environment/easybuild/*"
  push:
    branches:
      - "master"
    paths:
      - "**"
      - "!.github/workflows/*"
      - ".github/workflows/conda.yml"
      - "!environment/easybuild/*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  build:
    name: conda / ${{ matrix.os }} / ${{ matrix.target-platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 300
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "macos-26"
            target-platform: osx-arm64
          - os: "ubuntu-24.04"
            target-platform: linux-64
          - os: "windows-2025-vs2026"
            target-platform: win-64
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Conda
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment/conda/conda_build_environment.yaml
          init-shell: bash
          cache-environment: false
          post-cleanup: "all"
      - name: Build package
        run: |
          conda-build environment/conda $MAMBA_ROOT_PREFIX/envs/lue/conda-bld/${{ matrix.target-platform }}
      - name: Upload
        uses: Dylan700/sftp-upload-action@latest
        if: github.repository == 'computationalgeography/lue' && github.ref == 'refs/heads/master'
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          delete: true
          uploads: |
            $MAMBA_ROOT_PREFIX/envs/lue/conda-bld/${{ matrix.target-platform }} => ${{ secrets.FTP_REMOTE_DIR }}/download/conda/${{ matrix.target-platform}}/
